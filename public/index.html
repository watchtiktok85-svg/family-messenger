<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SharIQ - Умный мессенджер</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div id="app">
        <div class="loading-screen">
            <div class="loading-spinner"></div>
            <div>Загрузка SharIQ...</div>
        </div>
    </div>

    <!-- Модальное окно для просмотра изображений -->
    <div id="imageModal" class="modal" style="display: none;" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <!-- Индикатор загрузки файлов -->
    <div id="uploadProgress" class="upload-progress" style="display: none;">
        <div>📤 Отправка файла...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- Уведомление о печатании -->
    <div id="typingNotification" class="typing-notification" style="display: none;"></div>

    <!-- Подключаем Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <!-- Подключаем все JS файлы -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chats.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/file.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
